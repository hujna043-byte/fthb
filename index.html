<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shuzycky</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: #0f0f0f; /* Глубокий темный */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }

        .container {
            width: 100%;
            max-width: 380px;
            text-align: center;
            padding: 20px;
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            object-fit: cover;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .description {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 35px;
            letter-spacing: 0.5px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            padding: 14px;
            background: #1a1a1a;
            color: #eee;
            text-decoration: none;
            border-radius: 12px; /* Умеренное закругление */
            font-size: 0.95rem;
            transition: 0.2s ease;
            border: 1px solid #252525;
        }

        .link-card:hover {
            background: #252525;
            border-color: #444;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.65rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="avatar.png" class="profile-img" alt="shuzycky">

        <h1>shuzycky</h1>
        <p class="description">Developer & Creator</p>

        <div class="links">
            <a href="https://t.me/shuzycky" class="link-card" target="_blank">Telegram</a>
            <a href="https://youtube.com/@shuzycky" class="link-card" target="_blank">YouTube</a>
            <a href="https://www.tiktok.com/@shuzycky" class="link-card" target="_blank">TikTok</a>
            <a href="https://www.instagram.com/shuzycky.sh" class="link-card" target="_blank">Instagram</a>
            <a href="https://www.twitch.tv/shuzycky" class="link-card" target="_blank">Twitch</a>
        </div>

        <div class="footer">
            2026 • ODESA
        </div>
    </div>

</body>
</html>
