<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shuzycky | digital business card</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent-color: #8b5cf6; /* Фиолетовый акцент */
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .avatar-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            padding: 3px;
            background: linear-gradient(135deg, var(--accent-color), #3b82f6);
            border-radius: 50%;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg-color);
            display: block;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            margin-bottom: 6px;
        }

        .description {
            font-size: 0.875rem;
            color: var(--text-dim);
            margin-bottom: 32px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-card {
            display: block;
            padding: 16px;
            background: var(--card-bg);
            color: var(--text-main);
            text-decoration: none;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.5);
        }

        .link-card:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 48px;
            font-size: 0.75rem;
            color: #4b5563;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar-wrapper">
            <img src="avatar.ipg" class="profile-img" alt="shuzycky">
        </div>

        <h1>shuzycky</h1>
        <p class="description">Developer • Designer • Creator</p>

        <div class="links">
            <a href="https://t.me/shuzycky" class="link-card" target="_blank">Telegram</a>
            <a href="https://youtube.com/@shuzycky" class="link-card" target="_blank">YouTube</a>
            <a href="https://www.tiktok.com/@shuzycky" class="link-card" target="_blank">TikTok</a>
            <a href="https://www.instagram.com/shuzycky.sh" class="link-card" target="_blank">Instagram</a>
            <a href="https://www.twitch.tv/shuzycky" class="link-card" target="_blank">Twitch</a>
        </div>

        <div class="footer">
            Built with Code • 2026
        </div>
    </div>

</body>
</html>
